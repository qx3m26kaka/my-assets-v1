<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⚡ 极客控制台 - 离线签发系统</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; padding: 40px; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f60; border-bottom: 2px solid #f60; padding-bottom: 10px; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #888; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #0f0; border-radius: 4px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #f60; }
        button { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        
        /* 一机一码按钮样式 */
        .btn-normal { background: #f60; color: #fff; margin-top: 25px; }
        .btn-normal:hover { background: #ff8533; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,102,0,0.4); }
        
        /* 万能码按钮样式 (尊贵紫) */
        .btn-god { background: #8a2be2; color: #fff; }
        .btn-god:hover { background: #9932cc; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138,43,226,0.4); }
        
        .result { margin-top: 25px; padding: 15px; background: #000; border-left: 4px solid #f60; display: none; }
        .result strong { display: block; word-break: break-all; color: #0f0; margin-top: 10px; font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🚀 极客控制台</h2>
        
        <label>1. 授权有效天数 (输入 36500 代表永久):</label>
        <input type="number" id="days" value="1" step="0.1">

        <label>2. 客户机器码 (万能码无需填写此项):</label>
        <input type="text" id="machineId" placeholder="例如: 3229234335">

        <button class="btn-normal" onclick="generateNormal()">⚡ 生成专属激活码 (一机一码)</button>
        <button class="btn-god" onclick="generateUniversal()">👑 生成万能激活码 (不限机器)</button>

        <div id="resultBox" class="result">
            <span id="resTitle" style="color: #f60; font-weight: bold;"></span>
            <strong id="licenseCode"></strong>
            <p style="font-size: 12px; color: #555; margin-top: 10px;">✅ 已自动复制到剪贴板，请直接发给客户</p>
        </div>
    </div>

    <script>
        // ==========================================
        // 功能 1：生成普通的一机一码 (绑定机器)
        // ==========================================
        function generateNormal() {
            let rawMid = document.getElementById('machineId').value.trim().replace(/\D/g, '');
            const mid = parseInt(rawMid, 10);
            const days = parseFloat(document.getElementById('days').value);

            if (!mid || isNaN(mid)) return alert('⚠️ 错误：生成专属码必须输入有效的纯数字机器码！');
            if (!days || days <= 0) return alert('⚠️ 错误：授权天数必须大于0！');

            const expireTime = Date.now() + Math.floor(days * 24 * 60 * 60 * 1000);
            const salt = 0x9E3779B9;
            const timePart = Math.floor(expireTime / 100000.0) >>> 0;
            const signature = (mid ^ salt ^ timePart) >>> 0;

            const licenseCode = btoa(expireTime.toString() + '|' + signature.toString());

            showResult(days > 3650 ? "💎 签发成功 (永久授权)" : `✅ 签发成功 (${days}天专属授权)`, licenseCode, "#f60");
        }

        // ==========================================
        // 功能 2：生成万能钥匙 (跳过机器码验证)
        // ==========================================
        function generateUniversal() {
            const days = parseFloat(document.getElementById('days').value);
            if (!days || days <= 0) return alert('⚠️ 错误：授权天数必须大于0！');

            const expireTime = Date.now() + Math.floor(days * 24 * 60 * 60 * 1000);
            
            // 👑 核心：强制签名等于底层 WASM 留好的后门密码 88888888
            const signature = 88888888; 

            const licenseCode = btoa(expireTime.toString() + '|' + signature.toString());

            showResult(days > 3650 ? "👑 签发成功 (永久万能码)" : `👑 签发成功 (${days}天万能码)`, licenseCode, "#8a2be2");
        }

        // ==========================================
        // 通用界面展示与复制逻辑
        // ==========================================
        function showResult(title, code, color) {
            const resultBox = document.getElementById('resultBox');
            resultBox.style.display = 'block';
            resultBox.style.borderLeftColor = color;
            
            const titleEl = document.getElementById('resTitle');
            titleEl.innerText = title;
            titleEl.style.color = color;
            
            document.getElementById('licenseCode').innerText = code;
            
            navigator.clipboard.writeText(code).catch(e => console.log("复制失败，请手动复制"));
        }
    </script>
</body>
</html>
